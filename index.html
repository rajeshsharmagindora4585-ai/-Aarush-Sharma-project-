</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Calculator</title>
    <style>
        /* Screen ke beech mein lane ke liye */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #4a4a6a);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Calculator Design */
        .calculator {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
        }

        #display {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            font-size: 24px;
            color: white;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.3s;
        }

        button:hover { background: rgba(255, 255, 255, 0.3); }
        .operator { background: #ff9500; font-weight: bold; }
        .operator:hover { background: #e08400; }
        .equal { background: #28a745; grid-column: span 2; }
        .equal:hover { background: #218838; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled placeholder="0">
    <div class="buttons">
        <button onclick="clearDisplay()" style="background:#ff3b30;">C</button>
        <button onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="appendToDisplay('/')">/</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(value) { display.value += value; }
    function clearDisplay() { display.value = ''; }
    function deleteLast() { display.value = display.value.slice(0, -1); }
    
    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
