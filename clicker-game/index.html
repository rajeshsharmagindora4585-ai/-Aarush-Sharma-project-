</html><!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Clicker Game</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a2e; color: white; font-family: sans-serif; 
        }
        #score { font-size: 50px; margin-bottom: 20px; color: #00d2ff; }
        
        /* Button Style */
        #clickBtn {
            padding: 20px 40px; font-size: 24px; cursor: pointer;
            background: #e94560; border: none; border-radius: 50px;
            color: white; font-weight: bold; transition: 0.1s;
            box-shadow: 0 10px #b02e45;
        }
        #clickBtn:active { transform: translateY(5px); box-shadow: 0 5px #b02e45; }
        
        #resetBtn { margin-top: 20px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Clicker Game</h1>
    <div id="score">0</div>
    <button id="clickBtn" onclick="increment()">Click Me!</button>
    <button id="resetBtn" onclick="reset()">Reset Score</button>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const btn = document.getElementById('clickBtn');

        function increment() {
            score++;
            scoreDisplay.innerText = score;
            
            // Har click par button thoda bada/chhota hoga
            btn.style.transform = "scale(0.95)";
            setTimeout(() => btn.style.transform = "scale(1)", 100);

            // 10 ke multiply hone par color badlega
            if (score % 10 === 0) {
                btn.style.background = "#" + Math.floor(Math.random()*16777215).toString(16);
            }
        }

        function reset() {
            score = 0;
            scoreDisplay.innerText = score;
            btn.style.background = "#e94560";
        }
    </script>
</body>
</html>
